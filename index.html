<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>uwit - Portal Dashboard</title>
    
    <!-- Meta tag PWA -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="uwit">
    <meta name="theme-color" content="#e0e5ec"> 
    
    <!-- Ikon Aplikasi -->
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=U&background=22c55e&color=fff&size=512&bold=true">
    <link rel="icon" type="image/png" href="https://ui-avatars.com/api/?name=U&background=22c55e&color=fff&size=192&bold=true">

    <!-- Manifest PWA -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"uwit Finance","short_name":"uwit","start_url":".","display":"standalone","background_color":"#e0e5ec","theme_color":"#22c55e","icons":[{"src":"https://ui-avatars.com/api/?name=U&background=22c55e&color=fff&size=512&bold=true","sizes":"512x512","type":"image/png"}]}'>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --bg: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --green: #22c55e;
            --dark: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); }

        /* --- Launcher Screen --- */
        .launcher-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 40px 25px; text-align: center;
        }

        .logo-box {
            width: 100px; height: 100px; background: var(--bg); 
            border-radius: 28px; display: flex; align-items: center; justify-content: center;
            font-size: 50px; font-weight: 800; color: var(--green); margin-bottom: 30px;
            box-shadow: 10px 10px 20px var(--shadow-dark), -10px -10px 20px var(--shadow-light);
        }

        h1 { font-size: 28px; font-weight: 800; color: #444; margin-bottom: 10px; }
        .subtitle { font-size: 14px; color: #777; font-weight: 600; margin-bottom: 50px; }

        .btn-card {
            width: 100%; max-width: 320px; padding: 25px; border-radius: 24px;
            margin-bottom: 25px; cursor: pointer; display: flex; align-items: center; gap: 20px;
            background: var(--bg); border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 8px 8px 15px var(--shadow-dark), -8px -8px 15px var(--shadow-light);
            transition: 0.2s; text-align: left;
        }
        .btn-card:active {
            box-shadow: inset 6px 6px 12px var(--shadow-dark), inset -6px -6px 12px var(--shadow-light);
            transform: scale(0.98);
        }
        .btn-card i { 
            font-size: 24px; width: 55px; height: 55px; display: flex; 
            align-items: center; justify-content: center;
            border-radius: 18px; background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }

        .btn-stable i { color: var(--green); }
        .btn-dev i { color: #f59e0b; }

        .btn-text h3 { font-size: 17px; font-weight: 800; color: #444; margin-bottom: 4px; }
        .btn-text p { font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- App Viewer (ULTIMATE FIX FOR TOP CUT) --- */
        .app-container { 
            display: none; width: 100%; height: 100%; 
            position: fixed; top: 0; left: 0; 
            background: white; 
            z-index: 1000;
        }
        
        /* Teknik Offset 45px adalah angka sakti untuk menyembunyikan banner Google 
           tanpa memotong konten aplikasi utama di iPhone 14 Pro. */
        iframe { 
            width: 100%; 
            height: calc(100% + 45px); 
            border: none; 
            margin-top: -45px; 
        }

        .nav-back {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--dark); color: white;
            padding: 12px 24px; border-radius: 30px; font-size: 12px; font-weight: 800;
            cursor: pointer; z-index: 10001; border: none;
            display: none; align-items: center; gap: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>

    <div id="launcher" class="launcher-screen">
        <div class="logo-box">U</div>
        <h1>uwit Portal</h1>
        <p class="subtitle">Sistem Manajemen Keuangan ElgaHQ</p>

        <div class="btn-card btn-stable" onclick="launchApp('stable')">
            <i class="fa-solid fa-shield-check"></i>
            <div class="btn-text">
                <h3>Versi Stabil</h3>
                <p>Minimalist UI</p>
            </div>
        </div>

        <div class="btn-card btn-dev" onclick="launchApp('dev')">
            <i class="fa-solid fa-vial-circle-check"></i>
            <div class="btn-text">
                <h3>Versi Dev</h3>
                <p>Skeuomorphic Edition</p>
            </div>
        </div>
        
        <p style="margin-top: 30px; font-size: 10px; color: #999; font-weight: 800; letter-spacing: 1px;">ELGAHQ V6.0-SKEUO</p>
    </div>

    <div id="app-view" class="app-container">
        <iframe id="main-frame" src="" title="uwit App View"></iframe>
    </div>

    <button id="exit-btn" class="nav-back" onclick="closeApp()">
        <i class="fa-solid fa-power-off"></i> Ganti Versi
    </button>

    <script>
        // MASUKKAN URL KOMANDAN DI SINI
        const URL_STABLE = "https://script.google.com/macros/s/AKfycbx7E6mP6J5Y_p8r9X_z8v3Y_h_K_R_D_V_B/exec"; 
        const URL_DEV    = "https://script.google.com/macros/s/AKfycbx7E6mP6J5Y_p8r9X_z8v3Y_h_K_R_D_V_B/exec"; 

        const launcher = document.getElementById('launcher');
        const appView = document.getElementById('app-view');
        const frame = document.getElementById('main-frame');
        const exitBtn = document.getElementById('exit-btn');

        function launchApp(mode) {
            const url = (mode === 'stable') ? URL_STABLE : URL_DEV;
            
            if (url.includes("MASUKKAN_URL") || url === "") {
                alert("Peringatan: URL Apps Script belum diisi di kode GitHub!");
                return;
            }

            launcher.style.display = 'none';
            appView.style.display = 'block';
            exitBtn.style.display = 'flex';
            frame.src = url;
        }

        function closeApp() {
            frame.src = "";
            appView.style.display = 'none';
            exitBtn.style.display = 'none';
            launcher.style.display = 'flex';
        }

        document.body.addEventListener('touchmove', function(e) {
            if (appView.style.display === 'block') return; 
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
