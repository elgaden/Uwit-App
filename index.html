<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>uwit - Portal Launcher</title>
    
    <!-- Meta tag PWA Utama -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="uwit">
    <meta name="theme-color" content="#ffffff"> 
    
    <!-- Ikon Aplikasi -->
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=U&background=22c55e&color=fff&size=512&bold=true">
    <link rel="icon" type="image/png" href="https://ui-avatars.com/api/?name=U&background=22c55e&color=fff&size=192&bold=true">

    <!-- Manifest PWA Otomatis -->
    <link rel="manifest" href='data:application/manifest+json,{"name":"uwit Finance","short_name":"uwit","start_url":".","display":"standalone","background_color":"#ffffff","theme_color":"#22c55e","icons":[{"src":"https://ui-avatars.com/api/?name=U&background=22c55e&color=fff&size=512&bold=true","sizes":"512x512","type":"image/png"}]}'>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root { 
            --bg: #ffffff;
            --green: #22c55e;
            --dark: #1e293b;
            --muted: #64748b;
            --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); }

        /* --- Tampilan Menu Portal (Launcher) --- */
        .launcher-screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; padding: 40px 25px; text-align: center;
        }

        .logo-box {
            width: 80px; height: 80px; background: var(--green); 
            border-radius: 20px; display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 800; color: white; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
        }

        h1 { font-size: 24px; font-weight: 800; color: var(--dark); margin-bottom: 8px; }
        .subtitle { font-size: 13px; color: var(--muted); font-weight: 600; margin-bottom: 45px; }

        /* --- Minimalist Button Style (FLAT) --- */
        .btn-card {
            width: 100%; max-width: 320px; padding: 22px; border-radius: 20px;
            margin-bottom: 15px; cursor: pointer; display: flex; align-items: center; gap: 18px;
            background: white; border: 1.5px solid var(--border);
            transition: 0.2s; text-align: left;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .btn-card:active { transform: scale(0.97); border-color: var(--green); background: #f0fdf4; }
        
        .btn-card i { font-size: 22px; color: var(--green); opacity: 0.8; }
        .btn-dev i { color: #f59e0b; }

        .btn-text h3 { font-size: 16px; font-weight: 800; color: var(--dark); margin-bottom: 2px; }
        .btn-text p { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- App Container & Iframe (Fix Terpotong) --- */
        .app-container { 
            display: none; width: 100%; height: 100%; 
            position: fixed; top: 0; left: 0; 
            background: white; z-index: 1000;
        }
        
        /* 45px adalah offset untuk menyembunyikan header Google Apps Script */
        iframe { 
            width: 100%; 
            height: calc(100% + 45px); 
            border: none; 
            margin-top: -45px; 
        }
    </style>
</head>
<body>

    <div id="launcher" class="launcher-screen">
        <div class="logo-box">U</div>
        <h1>Portal uwit</h1>
        <p class="subtitle">Pilih jalur dashboard ElgaHQ</p>

        <!-- STABLE -->
        <div class="btn-card" onclick="launchApp('stable')">
            <i class="fa-solid fa-circle-check"></i>
            <div class="btn-text">
                <h3>Versi Stabil</h3>
                <p>Aman & Teruji (Production)</p>
            </div>
        </div>

        <!-- DEV -->
        <div class="btn-card btn-dev" onclick="launchApp('dev')">
            <i class="fa-solid fa-vial"></i>
            <div class="btn-text">
                <h3>Versi Dev</h3>
                <p>Eksperimen Fitur Baru</p>
            </div>
        </div>
        
        <p style="margin-top: 40px; font-size: 9px; color: #cbd5e1; font-weight: 800; letter-spacing: 1px;">ELGAHQ FINANCE v6.5-STABLE</p>
    </div>

    <!-- AREA IFRAME -->
    <div id="app-view" class="app-container">
        <iframe id="main-frame" src="" title="uwit Finance App"></iframe>
    </div>

    <script>
        // MASUKKAN LINK APPS SCRIPT ANDA DI SINI
        const URL_STABLE = "https://script.google.com/macros/s/AKfycbzm8Sa7MNx9fMcLBaLLAhrSQPPIidXi0ZlPRPJmxLLkUR7L1G_9La5a-w0J6Pk0Wa0Dvw/exec"; 
        const URL_DEV    = "https://script.google.com/macros/s/AKfycbzqQZmuDLIdJOFNMc2GFJPAEBKtS6dT7NQAqtK9VG_ZrUJjFT86byrbMOP6U2KuBwwAGg/exec"; 

        const launcher = document.getElementById('launcher');
        const appView = document.getElementById('app-view');
        const frame = document.getElementById('main-frame');

        function launchApp(mode) {
            const url = (mode === 'stable') ? URL_STABLE : URL_DEV;
            
            if (url.includes("MASUKKAN_URL") || url === "") {
                alert("Peringatan: URL Apps Script belum diisi!");
                return;
            }

            launcher.style.display = 'none';
            appView.style.display = 'block';
            frame.src = url;
        }

        function closeApp() {
            frame.src = "";
            appView.style.display = 'none';
            launcher.style.display = 'flex';
        }

        // Mencegah scroll mental/tarik-turun di portal
        document.body.addEventListener('touchmove', function(e) {
            if (appView.style.display === 'block') return; 
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
